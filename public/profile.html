<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura — My Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #f472b6;
        --pink-deep: #db2777;
        --pink-light: #fce7f3;
        --pink-soft: #fff0f6;
        --gray: #6b7280;
        --dark: #1f2937;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--pink-soft);
        min-height: 100vh;
      }

      /* ── SVG Symbols ── */

      /* ── Navbar ── */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(244, 114, 182, 0.15);
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
      }
      .nav-brand {
        font-family: 'Playfair Display', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--pink-deep);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .nav-brand-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nav-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .btn-back {
        padding: 8px 18px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-back:hover {
        background: var(--pink);
        color: white;
      }
      .logout-btn {
        padding: 8px 16px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logout-btn:hover {
        background: var(--pink);
        color: white;
      }

      /* ── Cover Photo ── */
      .profile-hero {
        margin-top: 64px;
        animation: heroReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes heroReveal {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cover-photo {
        height: 220px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        background: linear-gradient(
          135deg,
          #f472b6 0%,
          #ec4899 40%,
          #db2777 70%,
          #be185d 100%
        );
      }
      .cover-photo-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        inset: 0;
      }
      .cover-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.3;
        animation: blobFloat 6s ease-in-out infinite;
      }
      .cover-blob-1 {
        width: 300px;
        height: 300px;
        background: #fda4af;
        top: -80px;
        right: 100px;
      }
      .cover-blob-2 {
        width: 200px;
        height: 200px;
        background: #fce7f3;
        bottom: -60px;
        left: 200px;
        animation-delay: -3s;
      }
      @keyframes blobFloat {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(15px, -15px);
        }
      }

      /* Cover overlay buttons */
      .cover-actions {
        position: absolute;
        top: 12px;
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 10;
      }
      .cover-btn {
        padding: 7px 14px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.3s;
        backdrop-filter: blur(8px);
      }
      .cover-btn-upload {
        background: rgba(255, 255, 255, 0.85);
        color: var(--pink-deep);
      }
      .cover-btn-upload:hover {
        background: white;
        transform: translateY(-1px);
      }
      .cover-btn-delete {
        background: rgba(239, 68, 68, 0.8);
        color: white;
      }
      .cover-btn-delete:hover {
        background: rgba(220, 38, 38, 0.9);
        transform: translateY(-1px);
      }
      #coverInput {
        display: none;
      }

      /* ── Profile Info Bar ── */
      .profile-info-bar {
        background: white;
        padding: 0 40px 28px;
        position: relative;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
      }

      /* ── Avatar with upload/delete ── */
      .profile-avatar-wrap {
        position: absolute;
        top: -64px;
        left: 40px;
      }
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 48px;
        font-weight: 700;
        border: 5px solid white;
        box-shadow: 0 8px 32px rgba(244, 114, 182, 0.4);
        animation: avatarPulse 3s ease-in-out infinite;
        overflow: hidden;
        position: relative;
        cursor: pointer;
      }
      .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      @keyframes avatarPulse {
        0%,
        100% {
          box-shadow: 0 8px 32px rgba(244, 114, 182, 0.4);
        }
        50% {
          box-shadow: 0 12px 40px rgba(244, 114, 182, 0.6);
        }
      }

      .avatar-overlay {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .profile-avatar:hover .avatar-overlay {
        opacity: 1;
      }
      #dpInput {
        display: none;
      }

      /* DP action buttons below avatar */
      .avatar-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        justify-content: center;
      }
      .dp-btn {
        padding: 4px 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.3s;
      }
      .dp-btn-upload {
        background: var(--pink-light);
        color: var(--pink-deep);
      }
      .dp-btn-upload:hover {
        background: var(--pink);
        color: white;
      }
      .dp-btn-delete {
        background: #fee2e2;
        color: #dc2626;
      }
      .dp-btn-delete:hover {
        background: #fecaca;
      }
      .dp-btn-delete.hidden {
        display: none;
      }

      .profile-details {
        padding-top: 76px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }
      .profile-left {
        flex: 1;
      }
      .profile-name {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--dark);
      }
      .profile-username {
        color: var(--gray);
        font-size: 15px;
        margin-top: 2px;
      }
      .profile-bio-text {
        color: #374151;
        font-size: 14px;
        margin-top: 10px;
        line-height: 1.6;
        max-width: 480px;
      }

      /* Clickable stats */
      .profile-stats {
        display: flex;
        gap: 32px;
        margin-top: 18px;
      }
      .stat {
        text-align: center;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 12px;
        transition: all 0.2s;
      }
      .stat:hover {
        background: var(--pink-light);
        transform: translateY(-2px);
      }
      .stat-num {
        font-weight: 700;
        font-size: 22px;
        color: var(--dark);
      }
      .stat-label {
        font-size: 12px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .profile-actions {
        padding-top: 76px;
      }
      .btn-edit {
        padding: 10px 24px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-edit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(244, 114, 182, 0.5);
      }

      /* ── Tabs ── */
      .tabs-section {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
        animation: sectionReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.2s;
      }
      @keyframes sectionReveal {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .tabs {
        display: flex;
        gap: 0;
        margin: 24px 0;
        background: white;
        border-radius: 16px;
        padding: 6px;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.08);
      }
      .tab {
        flex: 1;
        padding: 10px 16px;
        border: none;
        background: none;
        font-size: 14px;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        color: var(--gray);
        cursor: pointer;
        border-radius: 12px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .tab.active {
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3);
      }

      /* ── Posts Grid ── */
      .posts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 40px;
      }
      .post-card {
        background: white;
        border-radius: 20px;
        padding: 22px;
        box-shadow: 0 4px 20px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation: cardReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        transform-style: preserve-3d;
      }
      .post-card:hover {
        transform: translateY(-6px) rotateX(2deg) rotateY(-1deg);
        box-shadow: 0 20px 48px rgba(244, 114, 182, 0.2);
        border-color: rgba(244, 114, 182, 0.25);
      }
      @keyframes cardReveal {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .post-content {
        font-size: 14px;
        line-height: 1.6;
        color: #374151;
        margin-bottom: 16px;
      }
      .post-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .post-time {
        font-size: 11px;
        color: #9ca3af;
      }
      .post-stats {
        display: flex;
        gap: 14px;
      }
      .post-stat {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        color: var(--gray);
      }
      .btn-delete-post {
        background: none;
        border: none;
        color: #fca5a5;
        cursor: pointer;
        padding: 6px;
        transition: all 0.3s;
        border-radius: 8px;
        display: flex;
        align-items: center;
      }
      .btn-delete-post:hover {
        background: #fee2e2;
        color: #dc2626;
        transform: scale(1.1);
      }

      /* ── Follow List ── */
      .follow-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 40px;
      }
      .follow-item {
        background: white;
        border-radius: 16px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
        transition: all 0.3s;
        cursor: pointer;
        animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .follow-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.15);
        background: var(--pink-soft);
      }
      .follow-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 20px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .follow-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .follow-info {
        flex: 1;
      }
      .follow-name {
        font-weight: 600;
        font-size: 15px;
        color: var(--dark);
      }
      .follow-username {
        color: var(--gray);
        font-size: 13px;
      }
      .follow-bio {
        color: #374151;
        font-size: 12px;
        margin-top: 2px;
      }

      /* empty & loading */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--gray);
        grid-column: 1/-1;
      }
      .empty-icon-wrap {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .empty-text {
        font-size: 15px;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--gray);
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--pink-light);
        border-top-color: var(--pink);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Edit Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(244, 114, 182, 0.15);
        backdrop-filter: blur(8px);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: white;
        border-radius: 28px;
        padding: 40px;
        width: 480px;
        box-shadow: 0 32px 80px rgba(244, 114, 182, 0.3);
        animation: modalReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes modalReveal {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-title {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 28px;
        color: var(--dark);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .modal-input-group {
        margin-bottom: 20px;
      }
      .modal-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 7px;
      }
      .modal-input {
        width: 100%;
        padding: 13px 16px;
        border: 2px solid var(--pink-light);
        border-radius: 14px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--dark);
        outline: none;
        transition: all 0.3s;
      }
      .modal-input:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
      }
      textarea.modal-input {
        min-height: 100px;
        resize: none;
      }
      .modal-actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
      }
      .btn-save {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-save:hover {
        transform: translateY(-2px);
      }
      .btn-cancel {
        padding: 14px 24px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-cancel:hover {
        background: #fce7f3;
      }

      /* Petals */
      .petal {
        position: fixed;
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #fce7f3, #f9a8d4);
        border-radius: 0 50% 50% 50%;
        opacity: 0.5;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0.6;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>

        <circle cx="12" cy="13" r="4" />

      >
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </symbol>
      <symbol
        id="i-trash"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="3 6 5 6 21 6" />
        <path
          d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
        />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </symbol>
      <symbol
        id="i-grid"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"

    <script>
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      let myUserId = null;

      function timeAgo(d) {
        const diff = (Date.now() - new Date(d)) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
      }

      // ── DP Upload & Delete ──
      function uploadDP(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const base64 = e.target.result;
          localStorage.setItem('myDP', base64);
          renderDP(base64);
        };
        reader.readAsDataURL(file);
      }

      function renderDP(src) {
        const avatar = document.getElementById('profileAvatar');
        const initials = document.getElementById('avatarInitials');
        if (src) {
          // keep overlay but add img
          initials.style.display = 'none';
          let img = avatar.querySelector('img.dp-img');
          if (!img) {
            img = document.createElement('img');
            img.className = 'dp-img';
            img.style.cssText =
              'width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;inset:0;';
            avatar.insertBefore(img, avatar.querySelector('.avatar-overlay'));
          }
          img.src = src;
          document.getElementById('dpDeleteBtn').classList.remove('hidden');
        } else {
          initials.style.display = '';
          const img = avatar.querySelector('img.dp-img');
          if (img) img.remove();
          document.getElementById('dpDeleteBtn').classList.add('hidden');
        }
      }

      function deleteDP() {
        if (!confirm('Remove profile photo?')) return;
        localStorage.removeItem('myDP');
        renderDP(null);
      }

      // ── Cover Upload & Delete ──
      function uploadCover(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const base64 = e.target.result;
          localStorage.setItem('myCover', base64);
          renderCover(base64);
        };
        reader.readAsDataURL(file);
      }

      function renderCover(src) {
        const img = document.getElementById('coverImg');
        const deleteBtn = document.getElementById('coverDeleteBtn');
        if (src) {
          img.src = src;
          img.style.display = 'block';
          deleteBtn.style.display = 'flex';
        } else {
          img.style.display = 'none';
          img.src = '';
          deleteBtn.style.display = 'none';
        }
      }

      function deleteCover() {
        if (!confirm('Remove cover photo?')) return;
        localStorage.removeItem('myCover');
        renderCover(null);
      }

      // ── Load Profile ──
      async function loadProfile() {
        try {
          const res = await fetch('http://localhost:5000/api/auth/me', {
            headers: { Authorization: 'Bearer ' + token },
          });
          const data = await res.json();
          myUserId = data._id;

          const initials = data.fullName?.[0]?.toUpperCase() || 'U';
          document.getElementById('avatarInitials').textContent = initials;
          document.getElementById('profileName').textContent =
            data.fullName || '';
          document.getElementById('profileUsername').textContent =
            '@' + (data.username || '');
          document.getElementById('profileBio').textContent =
            data.bio || 'No bio yet.';
          document.getElementById('statFollowers').textContent =
            data.followersCount || 0;
          document.getElementById('statFollowing').textContent =
            data.followingCount || 0;
          document.getElementById('editFullName').value = data.fullName || '';
          document.getElementById('editBio').value = data.bio || '';

          // Load saved DP & cover
          const dp = localStorage.getItem('myDP');
          if (dp) renderDP(dp);
          else {
            document.getElementById('dpDeleteBtn').classList.add('hidden');
          }

          const cover = localStorage.getItem('myCover');
          if (cover) renderCover(cover);
        } catch (e) {
          console.error(e);
        }
      }

      // ── Load My Posts ──
      async function loadMyPosts() {
        const grid = document.getElementById('postsGrid');
        grid.innerHTML =
          '<div class="loading" style="grid-column:1/-1"><div class="loading-spinner"></div> Loading...</div>';
        try {
          const res = await fetch('http://localhost:5000/api/posts', {
            headers: { Authorization: 'Bearer ' + token },
          });
          const data = await res.json();
          const myPosts = (data.posts || []).filter(
            (p) =>
              p.user?._id === user._id || p.user?.username === user.username
          );
          document.getElementById('statPosts').textContent = myPosts.length;
          renderMyPosts(myPosts);
        } catch (e) {}
      }

      function renderMyPosts(posts) {
        const grid = document.getElementById('postsGrid');
        if (!posts.length) {
          grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon-wrap">
              <svg style="width:48px;height:48px;stroke:var(--pink-light);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><use href="#i-inbox"/></svg>
            </div>
            <div class="empty-text">No posts yet. Share your first moment!</div>
          </div>`;
          return;
        }
        grid.innerHTML = posts
          .map(
            (p, i) => `
        <div class="post-card" style="animation-delay:${i * 0.1}s">
          <div class="post-content">${p.content}</div>
          <div class="post-meta">
            <div class="post-stats">
              <div class="post-stat">
                <svg style="width:14px;height:14px;stroke:var(--pink);fill:var(--pink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-heart"/></svg>
                ${p.likesCount || 0}
              </div>
              <div class="post-stat">
                <svg style="width:14px;height:14px;stroke:var(--gray);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-comment"/></svg>
                ${p.commentsCount || 0}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="post-time">${timeAgo(p.createdAt)}</span>
              <button class="btn-delete-post" onclick="deletePost('${p._id}')" title="Delete">
                <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-trash"/></svg>
              </button>
            </div>
          </div>
        </div>`
          )
          .join('');
      }

      async function deletePost(postId) {
        if (!confirm('Delete this post?')) return;
        try {
          const res = await fetch(`http://localhost:5000/api/posts/${postId}`, {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token },
          });
          if (res.ok) loadMyPosts();
        } catch (e) {}
      }

      // ── Load Followers ──
      async function loadFollowers() {
        const list = document.getElementById('followersList');
        list.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div></div>';
        try {
          const userId = myUserId || user._id;
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/followers`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const followers = await res.json();
          if (!followers.length) {
            list.innerHTML =
              '<div class="empty-state"><div class="empty-icon-wrap">👥</div><div class="empty-text">No followers yet.</div></div>';
            return;
          }
          list.innerHTML = followers
            .map(
              (u, i) => `
          <div class="follow-item" style="animation-delay:${i * 0.06}s" onclick="window.location='user-profile.html?id=${u._id}'">
            <div class="follow-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
            <div class="follow-info">
              <div class="follow-name">${u.fullName}</div>
              <div class="follow-username">@${u.username}</div>
              ${u.bio ? `<div class="follow-bio">${u.bio}</div>` : ''}
            </div>
            <svg style="width:16px;height:16px;stroke:var(--pink-light);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><use href="#i-arrow-left" transform="rotate(180,12,12)"/></svg>
          </div>`
            )
            .join('');
        } catch (e) {}
      }

      // ── Load Following ──
      async function loadFollowing() {
        const list = document.getElementById('followingList');
        list.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div></div>';
        try {
          const userId = myUserId || user._id;
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/following`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const following = await res.json();
          if (!following.length) {
            list.innerHTML =
              '<div class="empty-state"><div class="empty-icon-wrap">👤</div><div class="empty-text">Not following anyone yet.</div></div>';
            return;
          }
          list.innerHTML = following
            .map(
              (u, i) => `
          <div class="follow-item" style="animation-delay:${i * 0.06}s" onclick="window.location='user-profile.html?id=${u._id}'">
            <div class="follow-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
            <div class="follow-info">
              <div class="follow-name">${u.fullName}</div>
              <div class="follow-username">@${u.username}</div>
              ${u.bio ? `<div class="follow-bio">${u.bio}</div>` : ''}
            </div>
            <svg style="width:16px;height:16px;stroke:var(--pink-light);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><use href="#i-arrow-left" transform="rotate(180,12,12)"/></svg>
          </div>`
            )
            .join('');
        } catch (e) {}
      }

      // ── Tabs ──
      let currentTab = 'posts';
      function switchTab(tab) {
        currentTab = tab;
        ['posts', 'followers', 'following'].forEach((t) => {
          document.getElementById(`section-${t}`).style.display =
            t === tab ? 'block' : 'none';
          document
            .getElementById(`tab-${t}`)
            .classList.toggle('active', t === tab);
        });
        if (tab === 'posts') loadMyPosts();
        else if (tab === 'followers') loadFollowers();
        else if (tab === 'following') loadFollowing();
      }

      // ── Edit Modal ──
      function openEditModal() {
        document.getElementById('editModal').classList.add('open');
      }
      function closeEditModal() {
        document.getElementById('editModal').classList.remove('open');
      }

      async function saveProfile() {
        const fullName = document.getElementById('editFullName').value.trim();
        const bio = document.getElementById('editBio').value.trim();
        try {
          const res = await fetch('http://localhost:5000/api/users/profile', {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + token,
            },
            body: JSON.stringify({ fullName, bio }),
          });
          const data = await res.json();
          if (res.ok) {
            const updatedUser = {
              ...user,
              fullName: data.fullName,
              bio: data.bio,
            };
            localStorage.setItem('user', JSON.stringify(updatedUser));
            closeEditModal();
            loadProfile();
          }
        } catch (e) {}
      }

      function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }

      // ── Init ──
      loadProfile();
      loadMyPosts();
    </script>
  </body>
</html>
