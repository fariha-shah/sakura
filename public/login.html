<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --pink: #f472b6;
        --pink-light: #fce7f3;
        --pink-deep: #db2777;
        --pink-soft: #fff0f6;
        --white: #ffffff;
        --gray: #6b7280;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--pink-soft);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        animation: blobFloat 8s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      .blob-1 {
        width: 500px;
        height: 500px;
        background: #f9a8d4;
        top: -150px;
        right: -100px;
        animation-delay: 0s;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: #fda4af;
        bottom: -100px;
        left: -100px;
        animation-delay: -3s;
      }
      .blob-3 {
        width: 300px;
        height: 300px;
        background: #f9a8d4;
        top: 40%;
        left: 30%;
        animation-delay: -5s;
      }
      @keyframes blobFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(20px, -20px) scale(1.05);
        }
        66% {
          transform: translate(-15px, 15px) scale(0.95);
        }
      }
      /* Falling petals as SVG circles */
      .petal {
        position: fixed;
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #fce7f3, #f9a8d4);
        border-radius: 0 50% 50% 50%;
        opacity: 0.7;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0.8;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
      .container {
        position: relative;
        z-index: 10;
        display: flex;
        width: 900px;
        height: 560px;
        border-radius: 32px;
        overflow: hidden;
        box-shadow:
          0 40px 100px rgba(244, 114, 182, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.6);
        animation: containerReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes containerReveal {
        from {
          opacity: 0;
          transform: translateY(40px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      /* Left panel */
      .left-panel {
        width: 45%;
        background: linear-gradient(
          145deg,
          #f472b6 0%,
          #ec4899 50%,
          #db2777 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px;
        position: relative;
        overflow: hidden;
      }
      .left-panel::before {
        content: '';
        position: absolute;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        top: -100px;
        right: -80px;
      }
      .left-panel::after {
        content: '';
        position: absolute;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        bottom: -60px;
        left: -40px;
      }
      .brand {
        text-align: center;
        position: relative;
        z-index: 2;
      }
      .brand-icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        animation: iconSpin 6s ease-in-out infinite;
        backdrop-filter: blur(4px);
      }
      @keyframes iconSpin {
        0%,
        100% {
          transform: rotate(-5deg) scale(1);
        }
        50% {
          transform: rotate(5deg) scale(1.1);
        }
      }
      .brand-icon-wrap svg {
        color: white;
      }
      .brand-name {
        font-family: 'Playfair Display', serif;
        font-size: 42px;
        font-weight: 700;
        color: white;
        letter-spacing: -1px;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }
      .brand-tagline {
        color: rgba(255, 255, 255, 0.85);
        font-size: 13px;
        margin-top: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 300;
      }
      .left-illustration {
        margin-top: 40px;
        position: relative;
        z-index: 2;
      }
      .mountain {
        width: 160px;
        animation: mountainFloat 4s ease-in-out infinite;
      }
      @keyframes mountainFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      /* Right panel */
      .right-panel {
        width: 55%;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px);
        padding: 52px 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .form-title {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 6px;
      }
      .form-subtitle {
        color: var(--gray);
        font-size: 14px;
        margin-bottom: 36px;
      }
      .form-subtitle a {
        color: var(--pink-deep);
        text-decoration: none;
        font-weight: 500;
      }
      .input-group {
        margin-bottom: 20px;
        animation: inputReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .input-group:nth-child(1) {
        animation-delay: 0.2s;
      }
      .input-group:nth-child(2) {
        animation-delay: 0.3s;
      }
      @keyframes inputReveal {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .input-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 8px;
      }
      .input-wrapper {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #d1d5db;
        pointer-events: none;
        display: flex;
        align-items: center;
      }
      .input-icon svg {
        width: 17px;
        height: 17px;
      }
      input {
        width: 100%;
        padding: 14px 16px 14px 44px;
        border: 2px solid #fce7f3;
        border-radius: 14px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: #1f2937;
        background: #fff;
        transition: all 0.3s ease;
        outline: none;
      }
      input:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.12);
        transform: translateY(-1px);
      }
      input::placeholder {
        color: #d1d5db;
      }
      .forgot {
        text-align: right;
        margin-top: -12px;
        margin-bottom: 28px;
      }
      .forgot a {
        font-size: 13px;
        color: var(--pink-deep);
        text-decoration: none;
        font-weight: 500;
      }
      .btn-login {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #f472b6, #db2777);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(244, 114, 182, 0.5);
      }
      .btn-login:active {
        transform: translateY(0);
      }
      .btn-login svg {
        width: 18px;
        height: 18px;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: #d1d5db;
        font-size: 13px;
      }
      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #fce7f3;
      }
      .register-link {
        text-align: center;
        font-size: 14px;
        color: var(--gray);
      }
      .register-link a {
        color: var(--pink-deep);
        font-weight: 600;
        text-decoration: none;
      }
      .error-msg {
        background: #fee2e2;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .error-msg svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <script>
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = 6 + Math.random() * 8 + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.transform = `scale(${0.5 + Math.random()})`;
        document.body.appendChild(p);
      }
    </script>

    <div class="container">
      <!-- Left -->
      <div class="left-panel">
        <div class="brand">
          <div class="brand-icon-wrap">
            <i
              data-lucide="cherry"
              style="width: 36px; height: 36px; color: white"
            ></i>
          </div>
          <div class="brand-name">Sakura</div>
          <div class="brand-tagline">Connect &amp; Blossom</div>
        </div>
        <div class="left-illustration">
          <svg
            class="mountain"
            viewBox="0 0 200 150"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <ellipse
              cx="100"
              cy="140"
              rx="90"
              ry="12"
              fill="rgba(255,255,255,0.2)"
            />
            <polygon
              points="100,10 170,130 30,130"
              fill="rgba(255,255,255,0.25)"
            />
            <polygon
              points="100,10 125,55 75,55"
              fill="rgba(255,255,255,0.9)"
            />
            <rect
              x="80"
              y="100"
              width="5"
              height="35"
              fill="rgba(219,39,119,0.8)"
              rx="2"
            />
            <rect
              x="115"
              y="100"
              width="5"
              height="35"
              fill="rgba(219,39,119,0.8)"
              rx="2"
            />
            <rect
              x="75"
              y="98"
              width="50"
              height="7"
              fill="rgba(219,39,119,0.8)"
              rx="3"
            />
            <rect
              x="78"
              y="90"
              width="44"
              height="6"
              fill="rgba(219,39,119,0.7)"
              rx="3"
            />
            <circle cx="30" cy="60" r="18" fill="rgba(255,255,255,0.3)" />
            <circle cx="20" cy="50" r="12" fill="rgba(255,255,255,0.25)" />
            <circle cx="170" cy="55" r="16" fill="rgba(255,255,255,0.3)" />
            <circle cx="178" cy="45" r="10" fill="rgba(255,255,255,0.2)" />
          </svg>
        </div>
      </div>

      <!-- Right -->
      <div class="right-panel">
        <div class="form-title">Welcome back</div>
        <div class="form-subtitle">
          New here? <a href="register.html">Create an account</a>
        </div>

        <div class="error-msg" id="errorMsg">
          <i data-lucide="alert-circle"></i>
          <span id="errorText">Invalid email or password.</span>
        </div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><i data-lucide="mail"></i></span>
            <input type="email" id="email" placeholder="you@example.com" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon"><i data-lucide="lock"></i></span>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
        </div>

        <div class="forgot"><a href="#">Forgot password?</a></div>

        <button class="btn-login" onclick="handleLogin()">
          <i data-lucide="log-in"></i> Sign In to Sakura
        </button>

        <div class="divider">or</div>
        <div class="register-link">
          Don't have an account? <a href="register.html">Sign up free</a>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        errorMsg.style.display = 'none';
        if (!email || !password) {
          errorText.textContent = 'Please fill in all fields.';
          errorMsg.style.display = 'flex';
          return;
        }
        try {
          const res = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data));
            window.location.href = 'feed.html';
          } else {
            errorText.textContent = data.message || 'Login failed.';
            errorMsg.style.display = 'flex';
          }
        } catch (err) {
          errorText.textContent = 'Server error. Make sure backend is running.';
          errorMsg.style.display = 'flex';
        }
      }
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    </script>
  </body>
</html>
