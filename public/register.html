<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura — Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --pink: #f472b6;
        --pink-light: #fce7f3;
        --pink-deep: #db2777;
        --pink-soft: #fff0f6;
        --white: #ffffff;
        --gray: #6b7280;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--pink-soft);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        animation: blobFloat 8s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      .blob-1 {
        width: 500px;
        height: 500px;
        background: #f9a8d4;
        top: -150px;
        left: -100px;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: #fda4af;
        bottom: -100px;
        right: -100px;
        animation-delay: -3s;
      }
      @keyframes blobFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(15px, -15px) scale(1.05);
        }
      }
      .petal {
        position: fixed;
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #fce7f3, #f9a8d4);
        border-radius: 0 50% 50% 50%;
        opacity: 0.7;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0.8;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
      .container {
        position: relative;
        z-index: 10;
        display: flex;
        width: 960px;
        border-radius: 32px;
        overflow: hidden;
        box-shadow:
          0 40px 100px rgba(244, 114, 182, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.6);
        animation: containerReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes containerReveal {
        from {
          opacity: 0;
          transform: translateY(40px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .left-panel {
        width: 38%;
        background: linear-gradient(145deg, #f472b6, #db2777);
        padding: 52px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .left-panel::before {
        content: '';
        position: absolute;
        width: 280px;
        height: 280px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        top: -100px;
        right: -80px;
      }
      .brand {
        text-align: center;
        position: relative;
        z-index: 2;
      }
      .brand-icon-wrap {
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        animation: iconBounce 3s ease-in-out infinite;
        backdrop-filter: blur(4px);
      }
      @keyframes iconBounce {
        0%,
        100% {
          transform: translateY(0) rotate(-5deg);
        }
        50% {
          transform: translateY(-8px) rotate(5deg);
        }
      }
      .brand-name {
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        font-weight: 700;
        color: white;
      }
      .brand-tagline {
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 6px;
      }
      .perks {
        margin-top: 48px;
        position: relative;
        z-index: 2;
        width: 100%;
      }
      .perk {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        margin-bottom: 10px;
        backdrop-filter: blur(10px);
        color: white;
        font-size: 13px;
        font-weight: 500;
        animation: perkSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .perk:nth-child(1) {
        animation-delay: 0.3s;
      }
      .perk:nth-child(2) {
        animation-delay: 0.45s;
      }
      .perk:nth-child(3) {
        animation-delay: 0.6s;
      }
      @keyframes perkSlide {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .perk svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .right-panel {
        width: 62%;
        background: rgba(255, 255, 255, 0.93);
        backdrop-filter: blur(20px);
        padding: 48px 52px;
      }
      .form-title {
        font-family: 'Playfair Display', serif;
        font-size: 30px;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 4px;
      }
      .form-subtitle {
        color: var(--gray);
        font-size: 14px;
        margin-bottom: 32px;
      }
      .form-subtitle a {
        color: var(--pink-deep);
        text-decoration: none;
        font-weight: 500;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .input-group {
        margin-bottom: 18px;
        animation: inputReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .input-group:nth-child(1) {
        animation-delay: 0.15s;
      }
      .input-group:nth-child(2) {
        animation-delay: 0.25s;
      }
      .input-group:nth-child(3) {
        animation-delay: 0.35s;
      }
      .input-group:nth-child(4) {
        animation-delay: 0.45s;
      }
      @keyframes inputReveal {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .input-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 7px;
      }
      .input-wrapper {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #d1d5db;
        pointer-events: none;
        display: flex;
        align-items: center;
      }
      .input-icon svg {
        width: 16px;
        height: 16px;
      }
      input {
        width: 100%;
        padding: 13px 14px 13px 42px;
        border: 2px solid #fce7f3;
        border-radius: 13px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: #1f2937;
        background: #fff;
        transition: all 0.3s ease;
        outline: none;
      }
      input:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        transform: translateY(-1px);
      }
      input::placeholder {
        color: #d1d5db;
      }
      .terms {
        font-size: 13px;
        color: var(--gray);
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .terms a {
        color: var(--pink-deep);
        text-decoration: none;
        font-weight: 500;
      }
      .btn-register {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #f472b6, #db2777);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-register svg {
        width: 18px;
        height: 18px;
      }
      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(244, 114, 182, 0.5);
      }
      .login-link {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: var(--gray);
      }
      .login-link a {
        color: var(--pink-deep);
        font-weight: 600;
        text-decoration: none;
      }
      .error-msg {
        background: #fee2e2;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .error-msg svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .success-msg {
        background: #d1fae5;
        color: #065f46;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .success-msg svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <script>
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = 6 + Math.random() * 8 + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        document.body.appendChild(p);
      }
    </script>

    <div class="container">
      <div class="left-panel">
        <div class="brand">
          <div class="brand-icon-wrap">
            <i
              data-lucide="aperture"
              style="width: 34px; height: 34px; color: white"
            ></i>
          </div>
          <div class="brand-name">Sakura</div>
          <div class="brand-tagline">Connect &amp; Blossom</div>
        </div>
        <div class="perks">
          <div class="perk">
            <i data-lucide="message-circle"></i> Share your stories
          </div>
          <div class="perk">
            <i data-lucide="heart"></i> Like &amp; comment on posts
          </div>
          <div class="perk">
            <i data-lucide="users"></i> Follow your friends
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="form-title">Join Sakura</div>
        <div class="form-subtitle">
          Already have an account? <a href="login.html">Sign in</a>
        </div>

        <div class="error-msg" id="errorMsg">
          <i data-lucide="alert-circle"></i>
          <span id="errorText"></span>
        </div>
        <div class="success-msg" id="successMsg">
          <i data-lucide="check-circle"></i>
          <span>Account created! Redirecting...</span>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label class="input-label">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon"><i data-lucide="user"></i></span>
              <input type="text" id="fullName" placeholder="Your name" />
            </div>
          </div>
          <div class="input-group">
            <label class="input-label">Username</label>
            <div class="input-wrapper">
              <span class="input-icon"><i data-lucide="at-sign"></i></span>
              <input type="text" id="username" placeholder="username" />
            </div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><i data-lucide="mail"></i></span>
            <input type="email" id="email" placeholder="you@example.com" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon"><i data-lucide="lock"></i></span>
            <input
              type="password"
              id="password"
              placeholder="Min 6 characters"
            />
          </div>
        </div>

        <div class="terms">
          By signing up you agree to our <a href="#">Terms</a> and
          <a href="#">Privacy Policy</a>
        </div>

        <button class="btn-register" onclick="handleRegister()">
          <i data-lucide="user-plus"></i> Create My Account
        </button>
        <div class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
      async function handleRegister() {
        const fullName = document.getElementById('fullName').value;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        errorMsg.style.display = 'none';
        if (!fullName || !username || !email || !password) {
          errorText.textContent = 'Please fill in all fields.';
          errorMsg.style.display = 'flex';
          return;
        }
        try {
          const res = await fetch('http://localhost:5000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName, username, email, password }),
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data));
            successMsg.style.display = 'flex';
            setTimeout(() => (window.location.href = 'feed.html'), 1500);
          } else {
            errorText.textContent = data.message || 'Registration failed.';
            errorMsg.style.display = 'flex';
          }
        } catch (err) {
          errorText.textContent = 'Server error. Make sure backend is running.';
          errorMsg.style.display = 'flex';
        }
      }
    </script>
  </body>
</html>
