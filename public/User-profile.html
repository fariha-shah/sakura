<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura — User Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #f472b6;
        --pink-deep: #db2777;
        --pink-light: #fce7f3;
        --pink-soft: #fff0f6;
        --gray: #6b7280;
        --dark: #1f2937;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--pink-soft);
        min-height: 100vh;
      }

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(244, 114, 182, 0.15);
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
      }
      .nav-brand {
        font-family: 'Playfair Display', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--pink-deep);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .nav-brand-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nav-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .btn-back {
        padding: 8px 18px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-back:hover {
        background: var(--pink);
        color: white;
      }
      .logout-btn {
        padding: 8px 16px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logout-btn:hover {
        background: var(--pink);
        color: white;
      }

      .profile-hero {
        margin-top: 64px;
        animation: heroReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes heroReveal {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cover-photo {
        height: 220px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #f472b6 0%,
          #ec4899 40%,
          #db2777 70%,
          #be185d 100%
        );
      }
      .cover-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.3;
        animation: blobFloat 6s ease-in-out infinite;
      }
      .cover-blob-1 {
        width: 300px;
        height: 300px;
        background: #fda4af;
        top: -80px;
        right: 100px;
      }
      .cover-blob-2 {
        width: 200px;
        height: 200px;
        background: #fce7f3;
        bottom: -60px;
        left: 200px;
        animation-delay: -3s;
      }
      @keyframes blobFloat {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(15px, -15px);
        }
      }
      .cover-deco {
        position: absolute;
        font-size: 28px;
        animation: sakuraFloat 4s ease-in-out infinite;
        opacity: 0.6;
      }
      .cover-deco:nth-child(3) {
        top: 20px;
        left: 80px;
      }
      .cover-deco:nth-child(4) {
        top: 60px;
        right: 200px;
        animation-delay: -1.5s;
      }
      .cover-deco:nth-child(5) {
        bottom: 20px;
        left: 40%;
        animation-delay: -3s;
      }
      @keyframes sakuraFloat {
        0%,
        100% {
          transform: translateY(0) rotate(-10deg);
        }
        50% {
          transform: translateY(-12px) rotate(10deg);
        }
      }

      .profile-info-bar {
        background: white;
        padding: 0 40px 28px;
        position: relative;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
      }
      .profile-avatar-wrap {
        position: absolute;
        top: -60px;
        left: 40px;
      }
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 48px;
        font-weight: 700;
        border: 5px solid white;
        box-shadow: 0 8px 32px rgba(244, 114, 182, 0.4);
        animation: avatarPulse 3s ease-in-out infinite;
        overflow: hidden;
      }
      .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      @keyframes avatarPulse {
        0%,
        100% {
          box-shadow: 0 8px 32px rgba(244, 114, 182, 0.4);
        }
        50% {
          box-shadow: 0 12px 40px rgba(244, 114, 182, 0.6);
        }
      }

      .profile-details {
        padding-top: 72px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }
      .profile-left {
        flex: 1;
      }
      .profile-name {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--dark);
      }
      .profile-username {
        color: var(--gray);
        font-size: 15px;
        margin-top: 2px;
      }
      .profile-bio-text {
        color: #374151;
        font-size: 14px;
        margin-top: 10px;
        line-height: 1.6;
        max-width: 480px;
      }
      .profile-stats {
        display: flex;
        gap: 32px;
        margin-top: 18px;
      }
      .stat {
        text-align: center;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 12px;
        transition: all 0.2s;
      }
      .stat:hover {
        background: var(--pink-light);
        transform: translateY(-2px);
      }
      .stat-num {
        font-weight: 700;
        font-size: 22px;
        color: var(--dark);
      }
      .stat-label {
        font-size: 12px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .profile-actions {
        padding-top: 72px;
      }
      .btn-follow-main {
        padding: 11px 28px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 22px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-follow-main:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.5);
      }
      .btn-follow-main.following {
        background: white;
        color: var(--pink-deep);
        border: 2px solid var(--pink);
        box-shadow: none;
      }
      .btn-follow-main.following:hover {
        background: #fee2e2;
        border-color: #dc2626;
        color: #dc2626;
      }
      .btn-edit-own {
        padding: 11px 28px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 22px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .btn-edit-own:hover {
        background: var(--pink);
        color: white;
      }

      .tabs-section {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .tabs {
        display: flex;
        margin: 24px 0;
        background: white;
        border-radius: 16px;
        padding: 6px;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.08);
      }
      .tab {
        flex: 1;
        padding: 10px 16px;
        border: none;
        background: none;
        font-size: 14px;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        color: var(--gray);
        cursor: pointer;
        border-radius: 12px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .tab.active {
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3);
      }

      .posts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 40px;
      }
      .post-card {
        background: white;
        border-radius: 20px;
        padding: 22px;
        box-shadow: 0 4px 20px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation: cardReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        transform-style: preserve-3d;
      }
      .post-card:hover {
        transform: translateY(-6px) rotateX(2deg) rotateY(-1deg);
        box-shadow: 0 20px 48px rgba(244, 114, 182, 0.2);
      }
      @keyframes cardReveal {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .post-content {
        font-size: 14px;
        line-height: 1.6;
        color: #374151;
        margin-bottom: 16px;
      }
      .post-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .post-time {
        font-size: 11px;
        color: #9ca3af;
      }
      .post-stats {
        display: flex;
        gap: 14px;
      }
      .post-stat {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        color: var(--gray);
      }

      .follow-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 40px;
      }
      .follow-item {
        background: white;
        border-radius: 16px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
        transition: all 0.3s;
        cursor: pointer;
        animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .follow-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.15);
        background: var(--pink-soft);
      }
      .follow-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 20px;
        flex-shrink: 0;
      }
      .follow-info {
        flex: 1;
      }
      .follow-name {
        font-weight: 600;
        font-size: 15px;
        color: var(--dark);
      }
      .follow-username {
        color: var(--gray);
        font-size: 13px;
      }
      .follow-bio {
        color: #374151;
        font-size: 12px;
        margin-top: 2px;
      }
      .btn-follow-sm {
        padding: 6px 14px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-follow-sm:hover {
        transform: scale(1.05);
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--gray);
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--pink-light);
        border-top-color: var(--pink);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--gray);
        grid-column: 1/-1;
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
      }

      .petal {
        position: fixed;
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #fce7f3, #f9a8d4);
        border-radius: 0 50% 50% 50%;
        opacity: 0.4;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0.5;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVG Symbols -->

        <circle cx="12" cy="12" r="10" />
        <line x1="14.31" y1="8" x2="20.05" y2="17.94" />
        <line x1="9.69" y1="8" x2="21.17" y2="8" />
        <line x1="7.38" y1="12" x2="13.12" y2="2.06" />
        <line x1="9.69" y1="16" x2="3.95" y2="6.06" />

      <symbol

        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />

      <symbol

        <rect x="3" y="14" width="7" height="7" />

      <symbol
        id="i-users"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"

        id="i-comment"

        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        />

    </svg>

    <script>
      if (!localStorage.getItem('token')) window.location.href = 'login.html';
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = 8 + Math.random() * 10 + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        document.body.appendChild(p);
      }
    </script>

    <nav class="navbar">
      <a class="nav-brand" href="feed.html">
        <div class="nav-brand-icon">
          <svg
            style="
              width: 20px;
              height: 20px;
              stroke: white;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-aperture" />
          </svg>
        </div>
        Sakura
      </a>
      <div class="nav-actions">
        <a class="btn-back" href="feed.html">
          <svg
            style="
              width: 14px;
              height: 14px;
              stroke: currentColor;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-arrow-left" />
          </svg>
          Back to Feed
        </a>
        <button class="logout-btn" onclick="logout()">
          <svg
            style="
              width: 14px;
              height: 14px;
              stroke: currentColor;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-logout" />
          </svg>
          Logout
        </button>
      </div>
    </nav>

    <div class="profile-hero">
      <div class="cover-photo">
        <div class="cover-blob cover-blob-1"></div>
        <div class="cover-blob cover-blob-2"></div>
        <span class="cover-deco">🌸</span>
        <span class="cover-deco">🌺</span>
        <span class="cover-deco">🌸</span>
      </div>
      <div class="profile-info-bar">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar">?</div>
        </div>
        <div class="profile-details">
          <div class="profile-left">
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-username" id="profileUsername">@...</div>
            <div class="profile-bio-text" id="profileBio"></div>
            <div class="profile-stats">
              <div class="stat" onclick="switchTab('posts')">
                <div class="stat-num" id="statPosts">0</div>
                <div class="stat-label">Posts</div>
              </div>
              <div class="stat" onclick="switchTab('followers')">
                <div class="stat-num" id="statFollowers">0</div>
                <div class="stat-label">Followers</div>
              </div>
              <div class="stat" onclick="switchTab('following')">
                <div class="stat-num" id="statFollowing">0</div>
                <div class="stat-label">Following</div>
              </div>
            </div>
          </div>
          <div class="profile-actions" id="profileActions">
            <div class="loading" style="padding: 8px">
              <div
                class="loading-spinner"
                style="width: 20px; height: 20px; border-width: 2px; margin: 0"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tabs-section">
      <div class="tabs">
        <button class="tab active" id="tab-posts" onclick="switchTab('posts')">
          <svg
            style="
              width: 15px;
              height: 15px;
              stroke: currentColor;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-grid" />
          </svg>
          Posts
        </button>
        <button class="tab" id="tab-followers" onclick="switchTab('followers')">
          <svg
            style="
              width: 15px;
              height: 15px;
              stroke: currentColor;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-users" />
          </svg>
          Followers
        </button>
        <button class="tab" id="tab-following" onclick="switchTab('following')">
          <svg
            style="
              width: 15px;
              height: 15px;
              stroke: currentColor;
              fill: none;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            "
          >
            <use href="#i-usercheck" />
          </svg>
          Following
        </button>
      </div>
      <div id="section-posts">
        <div class="posts-grid" id="postsGrid">
          <div class="loading" style="grid-column: 1/-1">
            <div class="loading-spinner"></div>
            Loading posts...
          </div>
        </div>
      </div>
      <div id="section-followers" style="display: none">
        <div class="follow-list" id="followersList">
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>
      </div>
      <div id="section-following" style="display: none">
        <div class="follow-list" id="followingList">
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('token');
      const me = JSON.parse(localStorage.getItem('user') || '{}');

      // ── Get userId from URL ──
      const urlParams = new URLSearchParams(window.location.search);
      const profileUserId = urlParams.get('id');

      // If no id in URL redirect to feed
      if (!profileUserId) {
        window.location.href = 'feed.html';
      }

      let isFollowing = false;
      let profileUser = null;

      function timeAgo(d) {
        const diff = (Date.now() - new Date(d)) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
      }

      // ── Load profile by ID ──
      async function loadProfileInfo() {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/id/${profileUserId}`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (!res.ok) throw new Error('Not found');
          profileUser = await res.json();

          const initials = profileUser.fullName?.[0]?.toUpperCase() || '?';

          // Set DP — check if this is current user and has saved DP
          const avatar = document.getElementById('profileAvatar');
          if (profileUserId === me._id) {
            const dp = localStorage.getItem('myDP');
            if (dp) {
              avatar.innerHTML = `<img src="${dp}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="${initials}">`;
            } else {
              avatar.textContent = initials;
            }
          } else {
            avatar.textContent = initials;
          }

          document.getElementById('profileName').textContent =
            profileUser.fullName || '';
          document.getElementById('profileUsername').textContent =
            '@' + (profileUser.username || '');
          document.getElementById('profileBio').textContent =
            profileUser.bio || '';
          document.getElementById('statFollowers').textContent =
            profileUser.followersCount || 0;
          document.getElementById('statFollowing').textContent =
            profileUser.followingCount || 0;
          document.title = `Sakura — ${profileUser.fullName}`;

          const actionsDiv = document.getElementById('profileActions');

          // If viewing own profile → show Edit Profile button
          if (profileUserId === me._id) {
            actionsDiv.innerHTML = `
            <a href="profile.html" class="btn-edit-own">
              <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-edit"/></svg>
              Edit Profile
            </a>`;
          } else {
            // Check follow status then render button
            await checkFollowStatus();
            renderFollowButton(actionsDiv);
          }
        } catch (e) {
          console.error('loadProfileInfo:', e);
          document.getElementById('profileName').textContent = 'User not found';
        }
      }

      async function checkFollowStatus() {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${profileUserId}/isfollowing`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const data = await res.json();
          isFollowing = data.isFollowing;
        } catch (e) {
          isFollowing = false;
        }
      }

      function renderFollowButton(container) {
        if (isFollowing) {
          container.innerHTML = `
          <button class="btn-follow-main following" onclick="toggleFollow()">
            <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-usercheck"/></svg>
            Following
          </button>`;
        } else {
          container.innerHTML = `
          <button class="btn-follow-main" onclick="toggleFollow()">
            <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-userplus"/></svg>
            Follow
          </button>`;
        }
      }

      async function toggleFollow() {
        const method = isFollowing ? 'DELETE' : 'POST';
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${profileUserId}/follow`,
            {
              method,
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (res.ok) {
            isFollowing = !isFollowing;
            renderFollowButton(document.getElementById('profileActions'));
            const el = document.getElementById('statFollowers');
            el.textContent = parseInt(el.textContent) + (isFollowing ? 1 : -1);
          }
        } catch (e) {}
      }

      // ── Posts ──
      async function loadPosts() {
        const grid = document.getElementById('postsGrid');
        grid.innerHTML =
          '<div class="loading" style="grid-column:1/-1"><div class="loading-spinner"></div></div>';
        try {
          const res = await fetch(
            `http://localhost:5000/api/posts/user/${profileUserId}`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (!res.ok) throw new Error();
          const posts = await res.json();
          document.getElementById('statPosts').textContent = posts.length;
          if (!posts.length) {
            grid.innerHTML =
              '<div class="empty-state"><div class="empty-icon">🌸</div><div>No posts yet.</div></div>';
            return;
          }
          grid.innerHTML = posts
            .map(
              (p, i) => `
          <div class="post-card" style="animation-delay:${i * 0.08}s">
            <div class="post-content">${p.content}</div>
            <div class="post-meta">
              <div class="post-stats">
                <div class="post-stat">
                  <svg style="width:14px;height:14px;fill:var(--pink);stroke:var(--pink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-heart"/></svg>
                  ${p.likesCount || 0}
                </div>
                <div class="post-stat">
                  <svg style="width:14px;height:14px;fill:none;stroke:var(--gray);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#i-comment"/></svg>
                  ${p.commentsCount || 0}
                </div>
              </div>
              <span class="post-time">${timeAgo(p.createdAt)}</span>
            </div>
          </div>`
            )
            .join('');
        } catch (e) {
          grid.innerHTML =
            '<div class="empty-state"><div class="empty-icon">⚠️</div><div>Could not load posts.</div></div>';
        }
      }

      // ── Followers ──
      async function loadFollowers() {
        const list = document.getElementById('followersList');
        list.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div></div>';
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${profileUserId}/followers`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const followers = await res.json();
          if (!followers.length) {
            list.innerHTML =
              '<div class="empty-state"><div class="empty-icon">👥</div><div>No followers yet.</div></div>';
            return;
          }
          list.innerHTML = followers
            .map(
              (u, i) => `
          <div class="follow-item" style="animation-delay:${i * 0.06}s" onclick="window.location='user-profile.html?id=${u._id}'">
            <div class="follow-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
            <div class="follow-info">
              <div class="follow-name">${u.fullName}</div>
              <div class="follow-username">@${u.username}</div>
              ${u.bio ? `<div class="follow-bio">${u.bio}</div>` : ''}
            </div>
            ${
              u._id !== me._id
                ? `<button class="btn-follow-sm" onclick="event.stopPropagation();quickFollow('${u._id}',this)">Follow</button>`
                : `<span style="font-size:12px;color:var(--gray);padding:6px 10px;background:var(--pink-light);border-radius:10px;">You</span>`
            }
          </div>`
            )
            .join('');
        } catch (e) {}
      }

      // ── Following ──
      async function loadFollowing() {
        const list = document.getElementById('followingList');
        list.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div></div>';
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${profileUserId}/following`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const following = await res.json();
          if (!following.length) {
            list.innerHTML =
              '<div class="empty-state"><div class="empty-icon">👤</div><div>Not following anyone yet.</div></div>';
            return;
          }
          list.innerHTML = following
            .map(
              (u, i) => `
          <div class="follow-item" style="animation-delay:${i * 0.06}s" onclick="window.location='user-profile.html?id=${u._id}'">
            <div class="follow-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
            <div class="follow-info">
              <div class="follow-name">${u.fullName}</div>
              <div class="follow-username">@${u.username}</div>
              ${u.bio ? `<div class="follow-bio">${u.bio}</div>` : ''}
            </div>
            ${
              u._id !== me._id
                ? `<button class="btn-follow-sm" onclick="event.stopPropagation();quickFollow('${u._id}',this)">Follow</button>`
                : `<span style="font-size:12px;color:var(--gray);padding:6px 10px;background:var(--pink-light);border-radius:10px;">You</span>`
            }
          </div>`
            )
            .join('');
        } catch (e) {}
      }

      async function quickFollow(userId, btn) {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/follow`,
            {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (res.ok) {
            btn.textContent = '✓ Following';
            btn.style.background = '#d1fae5';
            btn.style.color = '#065f46';
            btn.disabled = true;
          }
        } catch (e) {}
      }

      // ── Tabs ──
      function switchTab(tab) {
        ['posts', 'followers', 'following'].forEach((t) => {
          document.getElementById(`section-${t}`).style.display =
            t === tab ? 'block' : 'none';
          document
            .getElementById(`tab-${t}`)
            .classList.toggle('active', t === tab);
        });
        if (tab === 'posts') loadPosts();
        else if (tab === 'followers') loadFollowers();
        else if (tab === 'following') loadFollowing();
      }

      function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }

      // ── Init ──
      loadProfileInfo();
      loadPosts();
    </script>
  </body>
</html>
