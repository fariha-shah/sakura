<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura — Feed</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #f472b6;
        --pink-deep: #db2777;
        --pink-light: #fce7f3;
        --pink-soft: #fff0f6;
        --white: #ffffff;
        --gray: #6b7280;
        --dark: #1f2937;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--pink-soft);
        min-height: 100vh;
        color: var(--dark);
      }

      /* SVG icon base */
      .ico {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: inline-block;
        vertical-align: middle;
        flex-shrink: 0;
      }
      .ico-sm {
        width: 14px;
        height: 14px;
      }
      .ico-xs {
        width: 12px;
        height: 12px;
      }

      /* ── Navbar ── */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(244, 114, 182, 0.15);
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
      }
      .nav-brand {
        font-family: 'Playfair Display', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--pink-deep);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .nav-brand-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        animation: brandPulse 3s ease-in-out infinite;
      }
      @keyframes brandPulse {
        0%,
        100% {
          box-shadow: 0 4px 12px rgba(244, 114, 182, 0.4);
        }
        50% {
          box-shadow: 0 4px 20px rgba(244, 114, 182, 0.6);
        }
      }

      .nav-search-wrapper {
        position: relative;
        width: 300px;
      }
      .nav-search {
        display: flex;
        align-items: center;
        background: var(--pink-light);
        border-radius: 24px;
        padding: 8px 18px;
        gap: 10px;
        width: 100%;
        border: 2px solid transparent;
        transition: all 0.3s;
      }
      .nav-search:focus-within {
        border-color: var(--pink);
        background: white;
        box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
      }
      .nav-search input {
        border: none;
        background: transparent;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--dark);
        outline: none;
        width: 100%;
      }

      .search-dropdown {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        right: 0;
        background: white;
        border-radius: 18px;
        box-shadow: 0 12px 40px rgba(244, 114, 182, 0.25);
        border: 1px solid rgba(244, 114, 182, 0.15);
        z-index: 200;
        overflow: hidden;
        display: none;
      }
      .search-dropdown.open {
        display: block;
        animation: dropdownReveal 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes dropdownReveal {
        from {
          opacity: 0;
          transform: translateY(-8px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .search-dropdown-header {
        padding: 12px 16px 8px;
        font-size: 11px;
        font-weight: 600;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-bottom: 1px solid var(--pink-light);
      }
      .search-result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 16px;
        cursor: pointer;
        transition: all 0.2s;
        border-bottom: 1px solid var(--pink-light);
      }
      .search-result-item:last-child {
        border-bottom: none;
      }
      .search-result-item:hover {
        background: var(--pink-soft);
      }
      .search-result-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 15px;
        flex-shrink: 0;
      }
      .search-result-info {
        flex: 1;
      }
      .search-result-name {
        font-weight: 600;
        font-size: 14px;
        color: var(--dark);
      }
      .search-result-username {
        font-size: 12px;
        color: var(--gray);
      }
      .search-result-follow {
        padding: 5px 12px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
      }
      .search-result-follow:hover {
        transform: scale(1.05);
      }
      .search-empty {
        padding: 20px 16px;
        text-align: center;
        color: var(--gray);
        font-size: 14px;
      }
      .search-loading {
        padding: 16px;
        text-align: center;
        color: var(--gray);
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .nav-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.3s;
        text-decoration: none;
      }
      .nav-avatar:hover {
        transform: scale(1.1);
      }
      .logout-btn {
        padding: 8px 16px;
        background: var(--pink-light);
        color: var(--pink-deep);
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logout-btn:hover {
        background: var(--pink);
        color: white;
      }

      /* ── Layout ── */
      .layout {
        max-width: 1100px;
        margin: 0 auto;
        padding: 84px 24px 40px;
        display: grid;
        grid-template-columns: 280px 1fr 260px;
        gap: 24px;
        align-items: start;
      }

      /* ── Left Sidebar ── */
      .sidebar-left {
        position: sticky;
        top: 84px;
        animation: slideInLeft 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .profile-card {
        background: white;
        border-radius: 24px;
        padding: 28px 24px;
        text-align: center;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
        border: 1px solid rgba(244, 114, 182, 0.1);
        margin-bottom: 16px;
        transition: transform 0.3s;
      }
      .profile-card:hover {
        transform: translateY(-3px);
      }

      /* ── DP with image upload ── */
      .profile-avatar-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        margin: 0 auto 14px;
        cursor: pointer;
      }
      .profile-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.4);
        animation: avatarPulse 3s ease-in-out infinite;
        overflow: hidden;
        position: relative;
      }
      .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .avatar-overlay {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .profile-avatar-wrap:hover .avatar-overlay {
        opacity: 1;
      }
      .avatar-overlay svg {
        width: 20px;
        height: 20px;
        stroke: white;
        fill: none;
        stroke-width: 2;
      }
      #dpInput {
        display: none;
      }

      @keyframes avatarPulse {
        0%,
        100% {
          box-shadow: 0 8px 24px rgba(244, 114, 182, 0.4);
        }
        50% {
          box-shadow: 0 8px 32px rgba(244, 114, 182, 0.6);
        }
      }
      .profile-name {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--dark);
      }
      .profile-username {
        color: var(--gray);
        font-size: 13px;
        margin-top: 2px;
      }
      .profile-bio {
        font-size: 13px;
        color: var(--gray);
        margin-top: 10px;
        line-height: 1.5;
      }

      .profile-stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--pink-light);
      }
      .stat {
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s;
        padding: 4px 6px;
        border-radius: 10px;
      }
      .stat:hover {
        background: var(--pink-light);
        transform: translateY(-2px);
      }
      .stat-num {
        font-weight: 700;
        font-size: 18px;
        color: var(--dark);
      }
      .stat-label {
        font-size: 11px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .nav-menu {
        background: white;
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 14px;
        color: var(--gray);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
      }
      .nav-item:hover,
      .nav-item.active {
        background: var(--pink-light);
        color: var(--pink-deep);
      }

      /* ── Feed ── */
      .feed-center {
        animation: slideInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.1s;
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .create-post {
        background: white;
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.1);
        border: 1px solid rgba(244, 114, 182, 0.1);
      }
      .create-post-top {
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .create-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 17px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .create-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .create-textarea {
        flex: 1;
        border: 2px solid var(--pink-light);
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--dark);
        resize: none;
        outline: none;
        min-height: 80px;
        transition: all 0.3s;
        background: #fffafc;
      }
      .create-textarea:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
      }
      .create-post-bottom {
        display: flex;
        justify-content: flex-end;
        margin-top: 14px;
      }
      .btn-post {
        padding: 10px 24px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.4);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-post:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(244, 114, 182, 0.5);
      }

      /* ── Post Card ── */
      .post-card {
        background: white;
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 16px;
        box-shadow: 0 4px 24px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.08);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation: postReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        transform-style: preserve-3d;
      }
      .post-card:hover {
        transform: translateY(-4px) rotateX(1deg);
        box-shadow: 0 16px 48px rgba(244, 114, 182, 0.18);
        border-color: rgba(244, 114, 182, 0.2);
      }
      @keyframes postReveal {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .post-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .post-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 17px;
        flex-shrink: 0;
        cursor: pointer;
        overflow: hidden;
        transition: transform 0.2s;
      }
      .post-avatar:hover {
        transform: scale(1.08);
      }
      .post-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .post-user-info {
        flex: 1;
      }
      .post-username {
        font-weight: 600;
        font-size: 15px;
        color: var(--dark);
      }
      .post-username a {
        color: inherit;
        text-decoration: none;
      }
      .post-username a:hover {
        color: var(--pink-deep);
        text-decoration: underline;
      }
      /* ── time — small gray no design ── */
      .post-time {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 1px;
      }

      .post-content {
        font-size: 15px;
        line-height: 1.6;
        color: #374151;
        margin-bottom: 18px;
      }
      .post-actions {
        display: flex;
        gap: 8px;
        padding-top: 14px;
        border-top: 1px solid var(--pink-light);
      }
      .action-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        background: var(--pink-light);
        color: var(--gray);
        font-size: 13px;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
      }
      .action-btn:hover {
        background: var(--pink);
        color: white;
        transform: scale(1.05);
      }
      .action-btn.liked {
        background: var(--pink);
        color: white;
      }
      .action-btn.liked .heart-icon {
        fill: white;
      }
      .action-btn.delete-btn:hover {
        background: #fee2e2;
        color: #dc2626;
      }

      /* ── Comments ── */
      .comments-section {
        margin-top: 16px;
        display: none;
      }
      .comments-section.open {
        display: block;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .comment-item {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }
      .comment-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f9a8d4, var(--pink));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
      }
      .comment-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .comment-bubble {
        background: var(--pink-light);
        border-radius: 14px;
        padding: 10px 14px;
        flex: 1;
      }
      .comment-user {
        font-weight: 600;
        font-size: 13px;
        color: var(--pink-deep);
      }
      .comment-text {
        font-size: 13px;
        color: #374151;
        margin-top: 2px;
      }
      .add-comment {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      .comment-input {
        flex: 1;
        border: 2px solid var(--pink-light);
        border-radius: 20px;
        padding: 10px 16px;
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        outline: none;
        transition: all 0.3s;
      }
      .comment-input:focus {
        border-color: var(--pink);
      }
      .btn-comment {
        padding: 10px 14px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 20px;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-comment:hover {
        transform: scale(1.05);
      }

      /* ── Right Sidebar ── */
      .sidebar-right {
        position: sticky;
        top: 84px;
        animation: slideInRight 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.2s;
      }
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .widget {
        background: white;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(244, 114, 182, 0.08);
        border: 1px solid rgba(244, 114, 182, 0.1);
      }
      .widget-title {
        font-family: 'Playfair Display', serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .trend-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--pink-light);
        cursor: pointer;
        transition: all 0.3s;
      }
      .trend-item:last-child {
        border-bottom: none;
      }
      .trend-item:hover {
        transform: translateX(4px);
      }
      .trend-tag {
        color: var(--pink-deep);
        font-weight: 600;
        font-size: 14px;
      }
      .trend-count {
        color: var(--gray);
        font-size: 12px;
      }

      /* ── Who to Follow ── */
      .suggest-user {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        padding: 8px 10px;
        border-radius: 14px;
        transition: all 0.3s;
        cursor: pointer;
      }
      .suggest-user:hover {
        background: var(--pink-soft);
      }
      .suggest-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f9a8d4, var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 16px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .suggest-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .suggest-info {
        flex: 1;
        min-width: 0;
      }
      .suggest-name {
        font-weight: 600;
        font-size: 13px;
        color: var(--dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .suggest-username {
        color: var(--gray);
        font-size: 11px;
      }
      .suggest-reason {
        font-size: 10px;
        color: var(--pink-deep);
        font-weight: 500;
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .btn-follow {
        padding: 6px 12px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 11px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
        white-space: nowrap;
      }
      .btn-follow:hover {
        transform: scale(1.05);
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--gray);
        font-size: 14px;
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--pink-light);
        border-top-color: var(--pink);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--gray);
      }
      .empty-text {
        font-size: 15px;
      }

      .petal {
        position: fixed;
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #fce7f3, #f9a8d4);
        border-radius: 0 50% 50% 50%;
        opacity: 0.5;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0.6;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* Followers/Following Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(244, 114, 182, 0.12);
        backdrop-filter: blur(8px);
        z-index: 300;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal-box {
        background: white;
        border-radius: 28px;
        width: 440px;
        max-height: 80vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 32px 80px rgba(244, 114, 182, 0.3);
        animation: modalReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes modalReveal {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-header {
        padding: 24px 28px 16px;
        border-bottom: 1px solid var(--pink-light);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-title {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--dark);
      }
      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: var(--pink-light);
        color: var(--pink-deep);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.3s;
      }
      .modal-close:hover {
        background: var(--pink);
        color: white;
      }
      .modal-body {
        overflow-y: auto;
        padding: 16px 28px;
      }
      .follow-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--pink-light);
        cursor: pointer;
        transition: all 0.2s;
      }
      .follow-item:last-child {
        border-bottom: none;
      }
      .follow-item:hover {
        transform: translateX(4px);
      }
      .follow-item-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 18px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .follow-item-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .follow-item-info {
        flex: 1;
      }
      .follow-item-name {
        font-weight: 600;
        font-size: 14px;
        color: var(--dark);
      }
      .follow-item-username {
        font-size: 12px;
        color: var(--gray);
      }
      .btn-follow-sm {
        padding: 6px 14px;
        background: linear-gradient(135deg, var(--pink), var(--pink-deep));
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-follow-sm:hover {
        transform: scale(1.05);
      }
      /* Post image */
      .post-image {
        width: 100%;
        max-height: 400px;
        object-fit: cover;
        border-radius: 16px;
        margin-bottom: 14px;
        border: 1px solid var(--pink-light);
        cursor: pointer;
        transition: transform 0.3s;
      }
      .post-image:hover {
        transform: scale(1.01);
      }

      /* Fullscreen image modal */
      .img-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 999;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .img-modal.open {

      }
      .img-modal img {
        max-width: 90vw;
        max-height: 90vh;

        justify-content: center;

      }

    <script>
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      let myProfileData = null;

      // ── Helper: make svg string ──
      function ico(id, size = 16) {
        return `<svg style="width:${size}px;height:${size}px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:middle;flex-shrink:0"><use href="#${id}"/></svg>`;
      }

      // ── Set user info ──
      function setUserInfo() {
        const initials = user.fullName ? user.fullName[0].toUpperCase() : 'U';
        document.getElementById('navAvatar').textContent = initials;
        document.getElementById('sideName').textContent = user.fullName || '';
        document.getElementById('sideUsername').textContent =
          '@' + (user.username || '');
        // Set DP if saved
        const dp = localStorage.getItem('myDP');
        if (dp) {
          setAvatarImage('sideAvatar', dp, initials);
          setAvatarImage('createAvatar', dp, initials);
        } else {
          document.getElementById('sideAvatar').textContent = initials;
          document.getElementById('createAvatar').textContent = initials;
        }
      }

      function setAvatarImage(elId, src, initials) {
        const el = document.getElementById(elId);
        if (!el) return;
        if (src) {
          el.innerHTML = `<img src="${src}" alt="${initials}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        } else {
          el.textContent = initials;
        }
      }

      // ── DP Upload (stored in localStorage as base64) ──
      function uploadDP(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const base64 = e.target.result;
          localStorage.setItem('myDP', base64);
          const initials = user.fullName?.[0]?.toUpperCase() || 'U';
          setAvatarImage('sideAvatar', base64, initials);
          setAvatarImage('createAvatar', base64, initials);
        };
        reader.readAsDataURL(file);
      }

      // ── Load profile stats ──
      async function loadProfile() {
        try {
          const res = await fetch('http://localhost:5000/api/auth/me', {
            headers: { Authorization: 'Bearer ' + token },
          });
          if (!res.ok) return;
          myProfileData = await res.json();
          document.getElementById('sideFollowers').textContent =
            myProfileData.followersCount || 0;
          document.getElementById('sideFollowing').textContent =
            myProfileData.followingCount || 0;
          document.getElementById('sideBio').textContent =
            myProfileData.bio || '';
        } catch (e) {
          console.error(e);
        }
      }

      // ── Load posts ──
      async function loadPosts() {
        const container = document.getElementById('feedContainer');
        container.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div>Loading posts...</div>';
        try {
          const res = await fetch('http://localhost:5000/api/posts', {
            headers: { Authorization: 'Bearer ' + token },
          });
          if (!res.ok) throw new Error('Failed ' + res.status);
          const data = await res.json();
          renderPosts(data.posts || []);
        } catch (e) {
          container.innerHTML = `<div class="empty-state">${ico('i-wifi-off', 40)}<div class="empty-text" style="margin-top:12px">Could not load posts.<br>Is the backend running?</div></div>`;
        }
      }

      function timeAgo(d) {
        const diff = (Date.now() - new Date(d)) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
      }

      function renderPosts(posts) {
        const container = document.getElementById('feedContainer');
        if (!posts.length) {
          container.innerHTML = `<div class="empty-state">${ico('i-inbox', 48)}<div class="empty-text" style="margin-top:12px">No posts yet. Be the first!</div></div>`;
          return;
        }
        const myDP = localStorage.getItem('myDP');
        container.innerHTML = posts
          .map((post, i) => {
            const initials = post.user?.fullName?.[0]?.toUpperCase() || 'U';
            const isLiked = post.likes && post.likes.includes(user._id);
            const isOwner = post.user?._id === user._id;
            const isMe = isOwner;
            const dpSrc = isMe && myDP ? myDP : null;
            const avatarContent = dpSrc
              ? `<img src="${dpSrc}" alt="${initials}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
              : initials;
            return `
          <div class="post-card" style="animation-delay:${i * 0.08}s">
            <div class="post-header">
              <div class="post-avatar" onclick="goToProfile('${post.user?._id}','${isOwner}')">
                ${avatarContent}
              </div>
              <div class="post-user-info">
                <div class="post-username">
                  <a href="#" onclick="event.preventDefault();goToProfile('${post.user?._id}','${isOwner}')">${post.user?.fullName || 'User'}</a>
                  <span style="color:var(--gray);font-weight:400;font-size:13px;margin-left:4px">@${post.user?.username || ''}</span>
                </div>
                <div class="post-time">${timeAgo(post.createdAt)}</div>
              </div>
            </div>
           ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
${post.image ? `<img class="post-image" src="${post.image}" alt="post" onclick="openImgModal('${post.image}')"/>` : ''}
            <div class="post-actions">
              <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post._id}',this)">
                <svg style="width:15px;height:15px;stroke:currentColor;fill:${isLiked ? 'currentColor' : 'none'};stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" class="heart-icon"><use href="#i-heart"/></svg>
                <span>${post.likesCount || 0}</span>
              </button>
              <button class="action-btn" onclick="toggleComments('${post._id}')">
                <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><use href="#i-comment"/></svg>
                <span>${post.commentsCount || 0}</span>
              </button>
              ${
                isOwner
                  ? `
              <button class="action-btn delete-btn" onclick="deletePost('${post._id}')" style="margin-left:auto">
                <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><use href="#i-trash"/></svg>
              </button>`
                  : ''
              }
            </div>
            <div class="comments-section" id="comments-${post._id}">
              <div id="comment-list-${post._id}"></div>
              <div class="add-comment">
                <input class="comment-input" placeholder="Write a comment..." id="comment-input-${post._id}"/>
                <button class="btn-comment" onclick="addComment('${post._id}')">
                  <svg style="width:15px;height:15px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><use href="#i-send"/></svg>
                </button>
              </div>
            </div>
          </div>`;
          })
          .join('');
      }

      function goToProfile(userId, isOwner) {
        if (!userId || userId === 'undefined') return;
        if (isOwner === 'true' || userId === user._id) {
          window.location.href = 'profile.html';
        } else {
          window.location.href = `user-profile.html?id=${userId}`;
        }
      }

      async function createPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content && !postImageBase64) {
          alert('Please write something or add a photo!');
          return;
        }

        const btn = document.querySelector('.btn-post');
        btn.disabled = true;
        btn.innerHTML = `<svg class="ico ico-sm" style="stroke:white"><use href="#i-send"/></svg> Posting...`;

        try {
          const res = await fetch('http://localhost:5000/api/posts', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + token,
            },
            body: JSON.stringify({
              content: content,
              image: postImageBase64,
            }),
          });

          const data = await res.json();
          console.log('Post response:', res.status, data);

          if (res.ok) {
            document.getElementById('postContent').value = '';
            removeImage();
            loadPosts();
          } else {
            alert('Error: ' + data.message);
          }
        } catch (e) {
          console.error('Post error:', e);
          alert('Could not create post. Check console.');
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<svg class="ico ico-sm" style="stroke:white"><use href="#i-send"/></svg> Post`;
        }
      }
      async function toggleLike(postId, btn) {
        const isLiked = btn.classList.contains('liked');
        try {
          const res = await fetch(
            `http://localhost:5000/api/posts/${postId}/like`,
            {
              method: isLiked ? 'DELETE' : 'POST',
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const data = await res.json();
          if (res.ok) {
            btn.classList.toggle('liked');
            const svg = btn.querySelector('svg');
            svg.style.fill = btn.classList.contains('liked')
              ? 'currentColor'
              : 'none';
            btn.querySelector('span').textContent = data.likesCount;
          }
        } catch (e) {}
      }

      function toggleComments(postId) {
        const s = document.getElementById(`comments-${postId}`);
        s.classList.toggle('open');
        if (s.classList.contains('open')) loadComments(postId);
      }

      async function loadComments(postId) {
        try {
          const res = await fetch(
            `http://localhost:5000/api/posts/${postId}/comments`,
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          const comments = await res.json();
          document.getElementById(`comment-list-${postId}`).innerHTML =
            comments.length
              ? comments
                  .map(
                    (c) => `
              <div class="comment-item">
                <div class="comment-avatar">${c.user?.fullName?.[0]?.toUpperCase() || 'U'}</div>
                <div class="comment-bubble">
                  <div class="comment-user">${c.user?.fullName || 'User'}</div>
                  <div class="comment-text">${c.content}</div>
                </div>
              </div>`
                  )
                  .join('')
              : '<div style="color:var(--gray);font-size:13px;padding:8px 0">No comments yet.</div>';
        } catch (e) {}
      }

      async function addComment(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        try {
          const res = await fetch(
            `http://localhost:5000/api/posts/${postId}/comments`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
              body: JSON.stringify({ content }),
            }
          );
          if (res.ok) {
            input.value = '';
            loadComments(postId);
            loadPosts();
          }
        } catch (e) {}
      }

      async function deletePost(postId) {
        if (!confirm('Delete this post?')) return;
        try {
          const res = await fetch(`http://localhost:5000/api/posts/${postId}`, {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token },
          });
          if (res.ok) loadPosts();
        } catch (e) {}
      }

      // ── Who to Follow ──
      const reasons = [
        { label: 'New on Sakura', icon: 'i-star' },
        { label: 'People you may know', icon: 'i-users' },
        { label: 'Suggested for you', icon: 'i-userplus' },
        { label: 'Popular on Sakura', icon: 'i-trending' },
        { label: 'Recently joined', icon: 'i-user' },
      ];

      async function loadSuggestedUsers() {
        const container = document.getElementById('suggestUsers');
        try {
          const res = await fetch(
            'http://localhost:5000/api/users/suggestions',
            {
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (!res.ok) throw new Error();
          const users = await res.json();
          if (!users.length) {
            container.innerHTML =
              '<div style="color:var(--gray);font-size:13px;text-align:center;padding:12px">You follow everyone! 🌸</div>';
            return;
          }
          container.innerHTML = users
            .map((u, i) => {
              const r = reasons[i % reasons.length];
              return `
            <div class="suggest-user" id="suggest-${u._id}" onclick="window.location='user-profile.html?id=${u._id}'">
              <div class="suggest-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
              <div class="suggest-info">
                <div class="suggest-name">${u.fullName}</div>
                <div class="suggest-username">@${u.username}</div>
                <div class="suggest-reason">
                  <svg style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><use href="#${r.icon}"/></svg>
                  ${r.label}
                </div>
              </div>
              <button class="btn-follow" onclick="event.stopPropagation();followUser('${u._id}',this)">Follow</button>
            </div>`;
            })
            .join('');
        } catch (e) {
          container.innerHTML =
            '<div style="color:var(--gray);font-size:13px;padding:8px">Could not load suggestions.</div>';
        }
      }

      async function followUser(userId, btn) {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/follow`,
            {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (res.ok) {
            const card = document.getElementById(`suggest-${userId}`);
            if (card) {
              card.style.transition = 'all 0.4s ease';
              card.style.opacity = '0';
              card.style.transform = 'translateX(20px)';
              setTimeout(() => {
                card.remove();
                loadSuggestedUsers();
                loadProfile();
              }, 400);
            }
          }
        } catch (e) {}
      }

      // ── Followers / Following Modal ──
      async function openModal(type) {
        const modal = document.getElementById('followModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        title.textContent = type === 'followers' ? 'Followers' : 'Following';
        body.innerHTML =
          '<div class="loading"><div class="loading-spinner"></div></div>';
        modal.classList.add('open');

        try {
          const userId = myProfileData?._id || user._id;
          const endpoint =
            type === 'followers'
              ? `http://localhost:5000/api/users/${userId}/followers`
              : `http://localhost:5000/api/users/${userId}/following`;

          const res = await fetch(endpoint, {
            headers: { Authorization: 'Bearer ' + token },
          });
          const list = await res.json();

          if (!list.length) {
            body.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray)">${type === 'followers' ? 'No followers yet.' : 'Not following anyone yet.'}</div>`;
            return;
          }

          body.innerHTML = list
            .map(
              (u) => `
          <div class="follow-item" onclick="closeModal();window.location='user-profile.html?id=${u._id}'">
            <div class="follow-item-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
            <div class="follow-item-info">
              <div class="follow-item-name">${u.fullName}</div>
              <div class="follow-item-username">@${u.username}</div>
            </div>
            ${
              u._id !== user._id
                ? `
            <button class="btn-follow-sm" onclick="event.stopPropagation();followFromModal('${u._id}',this)">Follow</button>`
                : ''
            }
          </div>`
            )
            .join('');
        } catch (e) {
          body.innerHTML =
            '<div style="text-align:center;padding:32px;color:var(--gray)">Could not load.</div>';
        }
      }

      function closeModal() {
        document.getElementById('followModal').classList.remove('open');
      }

      // Close modal on overlay click
      document
        .getElementById('followModal')
        .addEventListener('click', function (e) {
          if (e.target === this) closeModal();
        });

      async function followFromModal(userId, btn) {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/follow`,
            {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (res.ok) {
            btn.textContent = '✓ Following';
            btn.style.background = '#d1fae5';
            btn.style.color = '#065f46';
            btn.disabled = true;
            loadProfile();
          }
        } catch (e) {}
      }

      // ── Search Dropdown ──
      let searchTimer = null;
      const searchInput = document.getElementById('searchInput');
      const searchDropdown = document.getElementById('searchDropdown');
      const searchResults = document.getElementById('searchResults');

      searchInput.addEventListener('input', function () {
        const query = this.value.trim();
        clearTimeout(searchTimer);
        if (query.length < 1) {
          searchDropdown.classList.remove('open');
          return;
        }
        searchDropdown.classList.add('open');
        searchResults.innerHTML = `<div class="search-loading"><div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div> Searching...</div>`;
        searchTimer = setTimeout(async () => {
          try {
            const res = await fetch(
              `http://localhost:5000/api/users?search=${encodeURIComponent(query)}`,
              {
                headers: { Authorization: 'Bearer ' + token },
              }
            );
            const users = await res.json();
            if (!Array.isArray(users) || !users.length) {
              searchResults.innerHTML = `<div class="search-empty">No results for "<b>${query}</b>"</div>`;
              return;
            }
            searchResults.innerHTML = users
              .map(
                (u) => `
            <div class="search-result-item" onclick="window.location='user-profile.html?id=${u._id}'">
              <div class="search-result-avatar">${u.fullName?.[0]?.toUpperCase() || 'U'}</div>
              <div class="search-result-info">
                <div class="search-result-name">${u.fullName}</div>
                <div class="search-result-username">@${u.username}</div>
              </div>
              <button class="search-result-follow" onclick="event.stopPropagation();followFromSearch('${u._id}',this)">Follow</button>
            </div>`
              )
              .join('');
          } catch (e) {
            searchResults.innerHTML =
              '<div class="search-empty">Search failed.</div>';
          }
        }, 350);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-search-wrapper'))
          searchDropdown.classList.remove('open');
      });

      async function followFromSearch(userId, btn) {
        try {
          const res = await fetch(
            `http://localhost:5000/api/users/${userId}/follow`,
            {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token },
            }
          );
          if (res.ok) {
            btn.textContent = '✓';
            btn.style.background = '#d1fae5';
            btn.style.color = '#065f46';
            btn.disabled = true;
            loadProfile();
            loadSuggestedUsers();
          }
        } catch (e) {}
      }

      function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }
      // ── Post Image ──
      let postImageBase64 = '';

      function previewPostImage(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          postImageBase64 = e.target.result;
          document.getElementById('imagePreview').src = postImageBase64;
          document.getElementById('imagePreviewWrap').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }

      function removeImage() {
        postImageBase64 = '';
        document.getElementById('imagePreview').src = '';
        document.getElementById('imagePreviewWrap').style.display = 'none';
        document.getElementById('postImageInput').value = '';
      }

      function openImgModal(src) {
        document.getElementById('imgModalSrc').src = src;
        document.getElementById('imgModal').classList.add('open');
      }
      function closeImgModal() {
        document.getElementById('imgModal').classList.remove('open');
      }
      // ── Load Trending Hashtags ──
      async function loadTrending() {
        const container = document.getElementById('trendingContainer');
        try {
          const res = await fetch('http://localhost:5000/api/posts/trending', {
            headers: { Authorization: 'Bearer ' + token },
          });
          if (!res.ok) throw new Error();
          const trending = await res.json();

          if (!trending.length) {
            container.innerHTML = `
        <div style="color:var(--gray);font-size:13px;text-align:center;padding:12px">
          No trending tags yet.<br>
          <span style="font-size:11px">Use #hashtags in your posts!</span>
        </div>`;
            return;
          }

          container.innerHTML = trending
            .map(
              (item) => `
      <div class="trend-item">
        <span class="trend-tag">${item.tag}</span>
        <span class="trend-count">${item.count} ${item.count === 1 ? 'post' : 'posts'}</span>
      </div>`
            )
            .join('');
        } catch (e) {
          container.innerHTML = `
      <div style="color:var(--gray);font-size:13px;text-align:center;padding:12px">
        No trending tags yet.<br>
        <span style="font-size:11px">Use #hashtags in posts! 🌸</span>
      </div>`;
        }
      }
      // ── Init ──
      setUserInfo();
      loadProfile();
      loadPosts();
      loadSuggestedUsers();
      loadTrending();
    </script>
  </body>
</html>
